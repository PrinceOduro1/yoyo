<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A little surprise</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #fff0f5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
    overflow: hidden;
  }

  #enter-screen {
    text-align: center;
    padding: 2rem;
  }

  #enter-screen h1 {
    font-size: 1.6rem;
    color: #c0397a;
    margin-bottom: 1.5rem;
    font-weight: normal;
    letter-spacing: 0.03em;
  }

  #name-input {
    padding: 0.75rem 1.25rem;
    font-size: 1.1rem;
    border: 2px solid #f4a0c0;
    border-radius: 50px;
    outline: none;
    text-align: center;
    color: #7a1040;
    background: #fff;
    width: 260px;
    font-family: Georgia, serif;
    transition: border-color 0.2s;
  }

  #name-input:focus { border-color: #d4537e; }

  #go-btn {
    display: block;
    margin: 1.2rem auto 0;
    padding: 0.7rem 2.2rem;
    background: #d4537e;
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 1rem;
    cursor: pointer;
    font-family: Georgia, serif;
    transition: background 0.2s, transform 0.1s;
  }

  #go-btn:hover { background: #b83a65; }
  #go-btn:active { transform: scale(0.97); }

  #error-msg {
    margin-top: 1rem;
    font-size: 0.9rem;
    color: #999;
    min-height: 1.2rem;
  }

  #love-screen {
    display: none;
    text-align: center;
    padding: 2rem;
    position: relative;
  }

  #love-message {
    font-size: 2.2rem;
    color: #c0397a;
    font-weight: normal;
    letter-spacing: 0.04em;
    animation: fadeInUp 1s ease forwards;
    opacity: 0;
    line-height: 1.5;
  }

  #name-display {
    font-size: 2.8rem;
    color: #d4537e;
    font-weight: bold;
    display: block;
    margin-top: 0.3rem;
    animation: popIn 0.8s 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    opacity: 0;
    transform: scale(0.5);
  }

  #hearts-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .heart {
    position: absolute;
    bottom: -60px;
    font-size: 1.8rem;
    animation: floatUp linear forwards;
    opacity: 0.85;
  }

  #reset-btn {
    margin-top: 2.5rem;
    padding: 0.5rem 1.5rem;
    background: none;
    border: 1.5px solid #f4a0c0;
    color: #c0397a;
    border-radius: 50px;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: Georgia, serif;
    animation: fadeInUp 1s 1.5s ease forwards;
    opacity: 0;
    transition: background 0.2s;
  }

  #reset-btn:hover { background: #fff0f5; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0.9; }
    80%  { opacity: 0.7; }
    100% { transform: translateY(-110vh) rotate(25deg); opacity: 0; }
  }

  #sparkle-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  #love-screen > * { position: relative; z-index: 2; }
</style>
</head>
<body>

<div id="enter-screen">
  <h1>What's your name?</h1>
  <input type="text" id="name-input" placeholder="Enter your name..." autocomplete="off" />
  <button id="go-btn" onclick="checkName()">Enter</button>
  <p id="error-msg"></p>
</div>

<div id="love-screen">
  <canvas id="sparkle-canvas"></canvas>
  <div id="hearts-container"></div>
  <p id="love-message">
    I love you so much,
    <span id="name-display"></span>
  </p>
  <button id="reset-btn" onclick="reset()">Not me? Try again</button>
</div>

<script>
  const specialNames = ["benedicta", "candy"];

  document.getElementById('name-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkName();
  });

  function checkName() {
    const raw = document.getElementById('name-input').value.trim();
    const lower = raw.toLowerCase();
    if (!raw) {
      document.getElementById('error-msg').textContent = 'Please enter your name first.';
      return;
    }
    if (specialNames.includes(lower)) {
      showLove(raw);
    } else {
      document.getElementById('error-msg').textContent = "Hmm, this message isn't for you... yet.";
    }
  }

  function showLove(name) {
    document.getElementById('enter-screen').style.display = 'none';
    const ls = document.getElementById('love-screen');
    ls.style.display = 'block';
    document.getElementById('name-display').textContent = name + '!';
    document.body.style.background = '#fff0f5';
    launchHearts();
    launchSparkles();
  }

  function reset() {
    document.getElementById('love-screen').style.display = 'none';
    document.getElementById('enter-screen').style.display = 'block';
    document.getElementById('name-input').value = '';
    document.getElementById('error-msg').textContent = '';
    document.getElementById('hearts-container').innerHTML = '';
    stopSparkles();
  }

  function launchHearts() {
    const container = document.getElementById('hearts-container');
    const heartChars = ['♥', '❤', '💗', '💖', '💕'];
    let count = 0;
    const interval = setInterval(() => {
      if (count > 60) { clearInterval(interval); return; }
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
      h.style.left = (Math.random() * 95) + 'vw';
      h.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
      h.style.color = ['#e05080','#f472b6','#fb7185','#f43f5e','#d4537e'][Math.floor(Math.random()*5)];
      const dur = 3 + Math.random() * 4;
      h.style.animationDuration = dur + 's';
      h.style.animationDelay = (Math.random() * 0.5) + 's';
      container.appendChild(h);
      setTimeout(() => h.remove(), (dur + 0.6) * 1000);
      count++;
    }, 180);
  }

  let sparkleAnim;
  function launchSparkles() {
    const canvas = document.getElementById('sparkle-canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');
    const particles = [];

    for (let i = 0; i < 55; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: 1 + Math.random() * 3,
        dx: (Math.random() - 0.5) * 0.6,
        dy: -0.3 - Math.random() * 0.5,
        alpha: Math.random(),
        color: ['#f472b6','#fb7185','#fda4af','#f9a8d4','#fecdd3'][Math.floor(Math.random()*5)]
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.globalAlpha = Math.max(0, Math.min(1, p.alpha));
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
        p.alpha += (Math.random() - 0.5) * 0.08;
        if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
        if (p.alpha < 0) p.alpha = 0.5;
        if (p.alpha > 1) p.alpha = 0.8;
      });
      sparkleAnim = requestAnimationFrame(draw);
    }
    draw();
  }

  function stopSparkles() {
    cancelAnimationFrame(sparkleAnim);
    const canvas = document.getElementById('sparkle-canvas');
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  }
</script>
</body>
</html>
